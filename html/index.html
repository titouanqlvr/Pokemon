    <!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>

    <body id="body">
        <header>
            <h1>Pokemon knowledges</h1>
            <h4>R4.10 Complément web</h4>
        </header>
        
        <main>
            <section>
                <article>
                    <div>
                        <input type="text" placeholder="Dragon" id="searchType">
                        <div id="resultSearchType"></div>
                    </div>
                    <div id="selectedType"></div>
                </article>

                <article>
                    <div>
                        <input type="text" placeholder="Quick Attack" id="searchAttack">
                        <div id="resultSearchAttack"></div>
                    </div>
                    <div id="selectedAttack"></div>
                </article>
                <article class="last">
                    <input type="text" placeholder="Bulbasaur" id="search">
                    <button onclick="resetSort()" class="resetSort">Supprimer les filtres</button>
                </article>
            </section>
            <table>
                <thead>
                    <tr>
                        <th id="sortById">ID</th>
                        <th id="sortByName">Nom</th>
                        <th id="sortByType">Type(s)</th>
                        <th id="sortByStamina">Endurance</th>
                        <th id="sortByAtk">Attaque</th>
                        <th id="sortByDef">Défense</th>
                        <th>Image</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
            <p id="page"></p>
        </main>
        <nav>
            <button onclick="oldPage()" id="prec">< Prec</button>
            <button onclick="nextPage()" id="suiv">Suiv ></button>
        </nav>
        <aside id="popupImg"></aside>
        <footer>
            <h2>Développeurs : </h2>
            <p>Mathis Loquais</p>
            <p>Titouan Quillévéré</p>
        </footer>
    </body>
    <script src="js/jquery-3.7.1.min.js" defer></script>
    <script src="data/charged_moves.js" defer></script>
    <script src="data/fast_moves.js" defer></script>
    <script src="data/pokemon_moves.js" defer></script>
    <script src="data/pokemon_types.js" defer></script>
    <script src="data/pokemons.js" defer></script>
    <script src="data/type_effectiveness.js" defer></script>
    <script src="data/class_attack.js" defer></script>
    <script src="data/class_type.js" defer></script>
    <script src="data/class_pokemon.js" defer></script>
    <script src="test/test.js" defer></script>
    <script src="js/script.js" defer></script>


</html>
